<!DOCTYPE html>
<html lang="en">
<head>
    <title>Hydro-Sensors</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body {
            background: #020617;
            color: #f8fafc;
            font-family: sans-serif;
            padding: 20px;
            padding-top: 80px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .ticker-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: #ef4444;
            color: white;
            padding: 12px 0;
            z-index: 1050;
            overflow: hidden;
            white-space: nowrap;
            box-shadow: 0 2px 10px rgba(239, 68, 68, 0.5);
            border-bottom: 2px solid #b91c1c;
        }

        .ticker-text {
            display: inline-block;
            padding-left: 100%;
            animation: ticker 25s linear infinite;
            font-weight: bold;
            font-family: monospace;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        @keyframes ticker {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }

        .data-card {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid #1e293b;
            border-radius: 12px;
            padding: 30px;
            animation: fadeUp 0.6s ease;
        }

        .metric-box {
            background: #020617;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            height: 100%;
        }

        #floodMap {
            height: 400px;
            width: 100%;
            border-radius: 12px;
            border: 1px solid #3b82f6;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.2);
        }

        .water-tank {
            position: relative;
            height: 60px;
            background: #020617;
            border: 2px solid #334155;
            border-radius: 8px;
            overflow: hidden;
            margin-top: 15px;
        }

        .water-level {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 20%;
            background: rgba(59, 130, 246, 0.7);
            box-shadow: 0 -5px 15px rgba(59, 130, 246, 0.5);
            transition: height 3s ease-in-out, background 1s ease-in-out, box-shadow 1s ease-in-out;
        }

        .btn-scan {
            background: transparent;
            color: #3b82f6;
            border: 2px solid #3b82f6;
            font-weight: bold;
            font-size: 1.1rem;
            border-radius: 50px;
            padding: 15px 30px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-scan:hover {
            background: #3b82f6;
            color: #000;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.6);
        }

        .btn-back {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: #1e293b;
            color: white;
            border: 1px solid #3b82f6;
            border-radius: 30px;
            padding: 12px 25px;
            z-index: 1000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
            text-decoration: none;
            font-weight: bold;
        }

        .btn-back:hover {
            background: #3b82f6;
            color: white;
            transform: scale(1.05);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulseAlert {
            0% { box-shadow: 0 0 10px rgba(239, 68, 68, 0.2); }
            50% { box-shadow: 0 0 30px rgba(239, 68, 68, 0.8); }
            100% { box-shadow: 0 0 10px rgba(239, 68, 68, 0.2); }
        }

        footer {
            margin-top: auto;
            padding: 20px 0;
            border-top: 1px solid #1e293b;
            color: #64748b;
            font-size: 0.9rem;
            text-align: center;
        }
    </style>
</head>
<body class="container">
    <div class="ticker-bar">
        <div class="ticker-text">{{ ticker }}</div>
    </div>

    <a href="/" class="btn-back">⬅ Dashboard</a>
    <h2 class="fw-bold mb-2 mt-4 text-primary"> Hydrological Grid</h2>
    <p class="text-secondary mb-5">Municipal drainage telemetry and flash flood simulations.</p>

    <div class="data-card">
        <div class="row g-4">
            <div class="col-lg-5">
                <div id="statusBanner" class="p-3 mb-4 rounded text-center border border-primary bg-primary bg-opacity-10 text-primary fw-bold" style="font-family: monospace; letter-spacing: 1px;">
                    STATUS: NOMINAL WATER LEVELS
                </div>

                <div class="row g-2 mb-4">
                    <div class="col-6">
                        <div class="  metric-box ">
                            <small class="text-secondary text-uppercase">Flow Rate</small>
                            <h4 id="flowVal" class="m-0 text-white mt-1" style="font-family: monospace;">1,240 cfs</h4>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="metric-box">
                            <small class="text-secondary text-uppercase">Soil Saturation</small>
                            <h4 id="soilVal" class="m-0 text-white mt-1" style="font-family: monospace;">42%</h4>
                        </div>
                    </div>
                </div>

                <div class="mb-4">
                    <span class="text-secondary text-uppercase" style="font-size: 0.8rem;">Basin Submersion Index</span>
                    <div class="water-tank">
                        <div id="tankLevel" class="water-level"></div>
                    </div>
                    <div class="d-flex justify-content-between mt-1 text-secondary" style="font-size: 0.75rem; font-family: monospace;">
                        <span>0m</span>
                        <span id="meterVal">1.2m</span>
                        <span>10m</span>
                    </div>
                </div>

                <button class="btn-scan w-100 mt-2" onclick="runHydroScan()">INITIATE DEEP SCAN</button>
            </div>

            <div class="col-lg-7">
                <div id="floodMap"></div>
            </div>
        </div>
    </div>

    <footer>&copy; 2026 Genius Olympiad 8036 Project BinaryMonkeys</footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var fMap = L.map('floodMap').setView([20, 0], 2);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap, © CartoDB'
        }).addTo(fMap);

        var userLat = localStorage.getItem('userLat');
        var userLng = localStorage.getItem('userLng');
        var baseMarker;
        var floodOverlay;

        const alertAudio = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');

        window.onload = function() {
            if(userLat && userLng) {
                fMap.setView([parseFloat(userLat), parseFloat(userLng)], 13);
                baseMarker = L.marker([parseFloat(userLat), parseFloat(userLng)]).addTo(fMap).bindPopup("Calibrated Sector").openPopup();
            } else {
                document.getElementById('statusBanner').innerText = "ERROR: SECTOR UNCALIBRATED";
                document.getElementById('statusBanner').className = "p-3 mb-4 rounded text-center border border-secondary bg-secondary bg-opacity-10 text-secondary fw-bold";
            }
            setTimeout(() => { fMap.invalidateSize(); }, 500);
        };

        function runHydroScan() {
            if(!userLat || !userLng) {
                alert("Please calibrate your location on the Dashboard first.");
                return;
            }

            let btn = document.querySelector('.btn-scan');
            btn.innerText = "SCANNING TOPOGRAPHY...";
            btn.disabled = true;

            setTimeout(() => {
                alertAudio.play().catch(e => console.log(e));

                let banner = document.getElementById('statusBanner');
                banner.innerText = "WARNING: FLASH FLOOD PROBABILITY CRITICAL";
                banner.className = "p-3 mb-4 rounded text-center border border-danger bg-danger bg-opacity-10 text-danger fw-bold";
                banner.style.animation = "pulseAlert 1s infinite";

                document.getElementById('flowVal').innerText = "18,450 cfs";
                document.getElementById('flowVal').classList.add('text-danger');

                document.getElementById('soilVal').innerText = "98%";
                document.getElementById('soilVal').classList.add('text-danger');

                let tank = document.getElementById('tankLevel');
                tank.style.height = "85%";
                tank.style.background = "rgba(239, 68, 68, 0.7)";
                tank.style.boxShadow = "0 -5px 15px rgba(239, 68, 68, 0.5)";
                document.getElementById('meterVal').innerText = "8.5m";
                document.getElementById('meterVal').classList.add('text-danger');

                if(floodOverlay) fMap.removeLayer(floodOverlay);

                floodOverlay = L.circle([parseFloat(userLat), parseFloat(userLng)], {
                    color: '#3b82f6',
                    fillColor: '#3b82f6',
                    fillOpacity: 0.4,
                    radius: 100
                }).addTo(fMap);

                let radius = 100;
                let expandInterval = setInterval(() => {
                    radius += 150;
                    floodOverlay.setRadius(radius);
                    if(radius >= 3000) clearInterval(expandInterval);
                }, 100);

                fMap.flyTo([parseFloat(userLat), parseFloat(userLng)], 12);

                btn.innerText = "EVACUATE IMMEDIATELY";
                btn.style.borderColor = "#ef4444";
                btn.style.color = "#ef4444";
            }, 2000);
        }
    </script>
</body>
</html>
