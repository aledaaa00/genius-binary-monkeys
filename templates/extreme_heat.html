<!DOCTYPE html>
<html lang="en">
<head>
    <title>Thermal Threat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #020617;
            color: #f8fafc;
            font-family: sans-serif;
            padding: 20px;
            padding-top: 80px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .ticker-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: #ef4444;
            color: white;
            padding: 12px 0;
            z-index: 1050;
            overflow: hidden;
            white-space: nowrap;
            box-shadow: 0 2px 10px rgba(239, 68, 68, 0.5);
            border-bottom: 2px solid #b91c1c;
        }
        .ticker-text {
            display: inline-block;
            padding-left: 100%;
            animation: ticker 25s linear infinite;
            font-weight: bold;
            font-family: monospace;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }
        @keyframes ticker {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }
        .data-card {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid #1e293b;
            border-radius: 12px;
            padding: 30px;
            animation: fadeUp 0.5s ease;
        }
        .metric-box {
            background: #020617;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }
        .btn-back {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: #1e293b;
            color: white;
            border: 1px solid #f97316;
            border-radius: 30px;
            padding: 12px 25px;
            z-index: 1000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
            text-decoration: none;
            font-weight: bold;
        }
        .btn-back:hover {
            background: #f97316;
            color: white;
            transform: scale(1.05);
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        footer {
            margin-top: auto;
            padding: 20px 0;
            border-top: 1px solid #1e293b;
            color: #64748b;
            font-size: 0.9rem;
            text-align: center;
        }
    </style>
</head>
<body class="container">
    <div class="ticker-bar">
        <div class="ticker-text">{{ ticker }}</div>
    </div>

    <a href="/" class="btn-back">⬅ Dashboard</a>
    <h2 class="fw-bold mb-2 mt-4" style="color: #f97316;">☀️ Thermal Assessment</h2>
    <p class="text-secondary mb-5">Wet-Bulb Globe Temperature (WBGT) survivability metrics.</p>

    <div class="data-card">
        <div class="row g-4">
            <div class="col-md-6">
                <div class="metric-box">
                    <h6 class="text-secondary text-uppercase mb-3">Core Temp</h6>
                    <h1 class="m-0 fw-bold" style="color: #f97316;">{{ temp }}°C</h1>
                </div>
            </div>
            <div class="col-md-6">
                <div class="metric-box">
                    <h6 class="text-secondary text-uppercase mb-3">Humidity</h6>
                    <h1 class="m-0 fw-bold text-info">{{ hum }}%</h1>
                </div>
            </div>
            <div class="col-12 mt-4">
                <div class="p-4 rounded text-center border {% if 'CRITICAL' in danger %}border-danger bg-danger bg-opacity-10{% else %}border-success bg-success bg-opacity-10{% endif %}">
                    <h4 class="m-0 text-uppercase fw-bold {% if 'CRITICAL' in danger %}text-danger{% else %}text-success{% endif %}">
                        THREAT: {{ danger }}
                    </h4>
                </div>
            </div>
        </div>
    </div>

    <footer>&copy; 2026 Genius Olympiad 8036 Project BinaryMonkeys</footer>
</body>
</html>
