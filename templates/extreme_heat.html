<!DOCTYPE html>
<html lang="en">
<head>
    <title>Extreme Heat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white container mt-5">
    <div class="alert alert-danger text-center"><strong>{{ ticker }}</strong></div>
    <a href="/" class="btn btn-outline-light mb-4">Back to Dashboard</a>
    <h2>Extreme Heat Analysis</h2>

    <div class="card mt-4 bg-secondary text-white">
        <div class="card-body">
            <h4>Current Data</h4>
            <p><strong>Temperature:</strong> {{ temp }} °C</p>
            <p><strong>Humidity:</strong> {{ hum }} %</p>
            <p><strong>Danger Level:</strong> {{ danger }}</p>
        </div>
    </div>
</body>
</html>
