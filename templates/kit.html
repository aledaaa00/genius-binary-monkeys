<!DOCTYPE html>
<html lang="en">
<head>
    <title>Survival Kit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #020617;
            color: #f8fafc;
            font-family: sans-serif;
            padding: 20px;
            padding-top: 80px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .ticker-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: #ef4444;
            color: white;
            padding: 12px 0;
            z-index: 1050;
            overflow: hidden;
            white-space: nowrap;
            box-shadow: 0 2px 10px rgba(239, 68, 68, 0.5);
            border-bottom: 2px solid #b91c1c;
        }
        .ticker-text {
            display: inline-block;
            padding-left: 100%;
            animation: ticker 25s linear infinite;
            font-weight: bold;
            font-family: monospace;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }
        @keyframes ticker {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }
        .data-card {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid #1e293b;
            border-radius: 12px;
            padding: 30px;
            animation: fadeUp 0.5s ease;
            height: 100%;
        }
        .form-control {
            background: #020617;
            border: 1px solid #334155;
            color: white !important;
        }
        .form-control:focus {
            background: #020617;
            border-color: #22c55e;
            box-shadow: 0 0 0 0.25rem rgba(34, 197, 94, 0.25);
        }
        .btn-back {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: #1e293b;
            color: white;
            border: 1px solid #22c55e;
            border-radius: 30px;
            padding: 12px 25px;
            z-index: 1000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
            text-decoration: none;
            font-weight: bold;
        }
        .btn-back:hover {
            background: #22c55e;
            color: white;
            transform: scale(1.05);
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        footer {
            margin-top: auto;
            padding: 20px 0;
            border-top: 1px solid #1e293b;
            color: #64748b;
            font-size: 0.9rem;
            text-align: center;
        }
    </style>
</head>
<body class="container">
    <div class="ticker-bar">
        <div class="ticker-text">{{ ticker }}</div>
    </div>

    <a href="/" class="btn-back">⬅ Dashboard</a>
    <h2 class="fw-bold mb-2 mt-4 text-success">🎒 Logistics Calculator</h2>
    <p class="text-secondary mb-5">72-hour survival requirement processing.</p>

    <div class="row g-4">
        <div class="col-md-6">
            <div class="data-card">
                <h5 class="mb-4 text-light">Current Inventory</h5>
                <label class="form-label text-secondary">Biological Units (Family Size):</label>
                <input type="number" id="familySize" class="form-control mb-3 py-2" value="1">

                <label class="form-label text-secondary">H2O Reserves (Liters):</label>
                <input type="number" id="water" class="form-control mb-3 py-2" value="0">

                <label class="form-label text-secondary">Rations (Days):</label>
                <input type="number" id="food" class="form-control mb-3 py-2" value="0">

                <label class="form-label text-secondary">Medical Kits:</label>
                <input type="number" id="aid" class="form-control mb-4 py-2" value="0">

                <button class="btn btn-success w-100 py-3 fw-bold" onclick="calculate()">PROCESS LOGISTICS</button>
            </div>
        </div>
        <div class="col-md-6">
            <div id="results" class="data-card d-none" style="border-left: 4px solid #334155;">
                <h4 id="statusText" class="mb-4 fw-bold"></h4>
                <div class="p-3 rounded" style="background: rgba(0,0,0,0.4);">
                    <ul id="adviceList" class="m-0 text-light" style="line-height: 2;"></ul>
                </div>
            </div>
        </div>
    </div>

    <footer>&copy; 2026 Genius Olympiad 8036 Project BinaryMonkeys</footer>

    <script>
        function calculate() {
            let members = parseInt(document.getElementById('familySize').value) || 1;
            let water = parseInt(document.getElementById('water').value) || 0;
            let food = parseInt(document.getElementById('food').value) || 0;
            let aid = parseInt(document.getElementById('aid').value) || 0;

            let reqWater = members * 9;
            let reqFood = members * 3;

            const resultsBox = document.getElementById('results');
            const status = document.getElementById('statusText');
            const advice = document.getElementById('adviceList');

            resultsBox.classList.remove('d-none');
            advice.innerHTML = "";
            let isReady = true;

            if(water < reqWater) {
                isReady = false;
                advice.innerHTML += `<li class="text-warning">DEFICIT: Require ${reqWater - water} more liters of H2O.</li>`;
            }
            if(food < reqFood) {
                isReady = false;
                advice.innerHTML += `<li class="text-warning">DEFICIT: Require rations for ${reqFood - food} more days.</li>`;
            }
            if(aid < 1) {
                isReady = false;
                advice.innerHTML += `<li class="text-danger">CRITICAL: Medical supplies absent.</li>`;
            }

            if(isReady) {
                status.innerHTML = "<span class='text-success'>STATUS: OPTIMAL SURVIVABILITY</span>";
                resultsBox.style.borderLeftColor = "#22c55e";
            } else {
                status.innerHTML = "<span class='text-danger'>STATUS: COMPROMISED</span>";
                resultsBox.style.borderLeftColor = "#ef4444";
            }
        }
    </script>
</body>
</html>
