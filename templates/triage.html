<!DOCTYPE html>
<html lang="en">
<head>
    <title>Bio-Triage AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #020617;
            color: #f8fafc;
            font-family: sans-serif;
            padding: 20px;
            padding-top: 80px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .ticker-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: #ef4444;
            color: white;
            padding: 12px 0;
            z-index: 1050;
            overflow: hidden;
            white-space: nowrap;
            box-shadow: 0 2px 10px rgba(239, 68, 68, 0.5);
            border-bottom: 2px solid #b91c1c;
        }

        .ticker-text {
            display: inline-block;
            padding-left: 100%;
            animation: ticker 25s linear infinite;
            font-weight: bold;
            font-family: monospace;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        @keyframes ticker {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }

        .data-card {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid #1e293b;
            border-radius: 12px;
            padding: 30px;
            animation: fadeUp 0.5s ease;
        }

        .terminal-box {
            background: #000;
            border: 1px solid #22c55e;
            border-radius: 8px;
            padding: 20px;
            color: #22c55e;
            font-family: monospace;
            min-height: 250px;
            box-shadow: inset 0 0 15px rgba(34, 197, 94, 0.2);
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .form-control {
            background: #0f172a !important;
            border: 1px solid #334155 !important;
            color: #ffffff !important;
            font-family: monospace;
        }

        .form-control:focus {
            box-shadow: 0 0 0 0.25rem rgba(34, 197, 94, 0.25) !important;
            border-color: #22c55e !important;
        }

        .btn-back {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: #1e293b;
            color: white;
            border: 1px solid #22c55e;
            border-radius: 30px;
            padding: 12px 25px;
            z-index: 1000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
            text-decoration: none;
            font-weight: bold;
        }

        .btn-back:hover {
            background: #22c55e;
            color: #000;
            transform: scale(1.05);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        footer {
            margin-top: auto;
            padding: 20px 0;
            border-top: 1px solid #1e293b;
            color: #64748b;
            font-size: 0.9rem;
            text-align: center;
        }
    </style>
</head>
<body class="container">
    <div class="ticker-bar">
        <div class="ticker-text">{{ ticker }}</div>
    </div>

    <a href="/" class="btn-back">⬅ Dashboard</a>

    <h2 class="fw-bold mb-2 mt-4 text-success">️ Bio-Triage AI</h2>
    <p class="text-secondary mb-5">Input trauma symptoms for immediate offline emergency protocols.</p>

    <div class="data-card">
        <div class="row g-4">
            <div class="col-md-5">
                <label class="form-label text-secondary mb-2">Describe the injury (e.g. burn, cut, broken bone):</label>
                <textarea id="injuryInput" class="form-control mb-4" rows="4" placeholder="Enter condition here..."></textarea>
                <button class="btn btn-success w-100 py-3 fw-bold" onclick="analyzeInjury()">ANALYZE TRAUMA</button>
            </div>
            <div class="col-md-7">
                <div class="terminal-box" id="terminalOutput">
                    > SYSTEM READY.<br>
                    > AWAITING BIOMETRIC INPUT...
                </div>
            </div>
        </div>
    </div>

    <footer>&copy; 2026 Genius Olympiad 8036 Project BinaryMonkeys</footer>

    <script>
        function analyzeInjury() {
            const input = document.getElementById('injuryInput').value;
            const terminal = document.getElementById('terminalOutput');

            if(!input) {
                terminal.innerHTML = "> ERROR: No input detected.";
                return;
            }

            terminal.innerHTML = "> PROCESSING DATA...<br>> MATCHING MEDICAL DATABASE...<br><br>";

            fetch('/api/triage', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ injury: input })
            })
            .then(res => res.json())
            .then(data => {
                setTimeout(() => {
                    let color = data.severity === "CRITICAL RISK" ? "#ef4444" : "#f59e0b";

                    let html = `<strong style="color: ${color}">> THREAT: ${data.severity}</strong><br><br>`;
                    html += "> INITIATING FIRST AID PROTOCOL:<br>";

                    data.advice.forEach(line => {
                        if (line.includes("⚠️")) {
                            html += `<span style="color: #ef4444; font-weight: bold;">${line}</span><br>`;
                        } else {
                            html += `${line}<br>`;
                        }
                    });

                    terminal.innerHTML += html;
                }, 800);
            });
        }
    </script>
</body>
</html>
