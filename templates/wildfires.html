<!DOCTYPE html>
<html lang="en">
<head>
    <title>Wildfires</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body class="bg-dark text-white container mt-5">
    <div class="alert alert-danger text-center"><strong>{{ ticker }}</strong></div>
    <a href="/" class="btn btn-outline-light mb-4">Back to Dashboard</a>
    <h2>Wildfires Tracker</h2>

    <div id="firemap" style="height: 300px; width: 100%; border: 1px solid #555; margin-bottom: 20px;"></div>

    <form method="POST">
        <input type="hidden" name="lat" id="lat">
        <input type="hidden" name="lng" id="lng">
        <button type="submit" class="btn btn-danger">Report Fire</button>
    </form>

    {% if lat and lng %}
    <div class="mt-4 alert alert-danger">
        <h4>Fire Reported at {{ lat }}, {{ lng }}</h4>
    </div>
    {% endif %}

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var savedLat = localStorage.getItem('savedLat') || 20;
        var savedLng = localStorage.getItem('savedLng') || 0;

        var map = L.map('firemap').setView([savedLat, savedLng], savedLat == 20 ? 2 : 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        var fireMarker;
        map.on('click', function(e) {
            document.getElementById('lat').value = e.latlng.lat;
            document.getElementById('lng').value = e.latlng.lng;
            if(fireMarker) map.removeLayer(fireMarker);
            fireMarker = L.marker([e.latlng.lat, e.latlng.lng]).addTo(map);
        });

        {% if lat and lng %}
        var reportedLat = {{ lat }};
        var reportedLng = {{ lng }};
        L.marker([reportedLat, reportedLng]).addTo(map).bindPopup("Fire").openPopup();
        L.polygon([
            [reportedLat, reportedLng],
            [reportedLat + 0.05, reportedLng + 0.05],
            [reportedLat + 0.05, reportedLng - 0.05]
        ], {color: 'red'}).addTo(map);
        map.setView([reportedLat, reportedLng], 12);
        {% endif %}
    </script>
</body>
</html>
