<!DOCTYPE html>
<html lang="en">
<head>
    <title>Earthquakes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <a href="/" class="btn btn-outline-dark mb-4">Back to Dashboard</a>
    <h2>Live Earthquakes</h2>
    <ul class="list-group">
        {% for quake in quakes %}
            <li class="list-group-item">
                <strong>Magnitude:</strong> {{ quake.properties.mag }} <br>
                <strong>Location:</strong> {{ quake.properties.place }}
            </li>
        {% else %}
            <li class="list-group-item">No data loaded.</li>
        {% endfor %}
    </ul>
</body>
</html>
