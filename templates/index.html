<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DisasterEye</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body class="container mt-5">
    <h1 class="text-center mb-4">DisasterEye Dashboard</h1>

    <div class="row mb-4">
        <div class="col-md-8">
            <h4>Location Map</h4>
            <input type="text" id="locationInput" placeholder="Enter City" class="form-control mb-2">
            <button onclick="searchLocation()" class="btn btn-primary mb-2">Set Location</button>
            <div id="map" style="height: 400px; width: 100%; border: 1px solid #ccc;"></div>
        </div>
        <div class="col-md-4">
            <h4>Actions</h4>
            <button onclick="sendSOS()" class="btn btn-danger w-100 mb-2 py-3">Send S.O.S</button>
            <button onclick="registerVolunteer()" class="btn btn-success w-100 mb-2 py-3">Register as Volunteer</button>
            <button onclick="generateEvac()" class="btn btn-info w-100 mb-2 py-3">Generate Evacuation Route</button>
        </div>
    </div>

    <div class="row text-center">
        <div class="col-md-4 mb-3"><a href="/earthquakes" class="btn btn-primary w-100 py-3">Earthquakes</a></div>
        <div class="col-md-4 mb-3"><a href="/wildfires" class="btn btn-danger w-100 py-3">Wildfires</a></div>
        <div class="col-md-4 mb-3"><a href="/storms" class="btn btn-secondary w-100 py-3">Storms</a></div>
        <div class="col-md-4 mb-3"><a href="/floods" class="btn btn-info w-100 py-3">Floods</a></div>
        <div class="col-md-4 mb-3"><a href="/extreme-heat" class="btn btn-warning w-100 py-3">Extreme Heat</a></div>
        <div class="col-md-4 mb-3"><a href="/kit" class="btn btn-success w-100 py-3">Survival Kit</a></div>
        <div class="col-md-12"><a href="/chat" class="btn btn-dark w-100 py-3">Chat</a></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([20, 0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        var marker;
        var sosLayer = L.layerGroup().addTo(map);
        var volLayer = L.layerGroup().addTo(map);
        var routeLayer = L.layerGroup().addTo(map);

        function searchLocation() {
            var query = document.getElementById('locationInput').value;
            if(!query) return;
            fetch('https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(query))
            .then(res => res.json())
            .then(data => {
                if(data.length > 0) {
                    var lat = data[0].lat;
                    var lon = data[0].lon;
                    map.setView([lat, lon], 12);
                    if(marker) map.removeLayer(marker);
                    marker = L.marker([lat, lon]).addTo(map).bindPopup(data[0].display_name).openPopup();
                    localStorage.setItem('savedLat', lat);
                    localStorage.setItem('savedLng', lon);
                }
            });
        }

        function sendSOS() {
            var lat = localStorage.getItem('savedLat');
            var lng = localStorage.getItem('savedLng');
            if(!lat || !lng) return;
            fetch('/api/sos', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ lat: lat, lng: lng })
            }).then(() => loadMapData());
        }

        function registerVolunteer() {
            var lat = localStorage.getItem('savedLat');
            var lng = localStorage.getItem('savedLng');
            if(!lat || !lng) return;
            fetch('/api/volunteers', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ lat: lat, lng: lng })
            }).then(() => loadMapData());
        }

        function generateEvac() {
            var lat = parseFloat(localStorage.getItem('savedLat'));
            var lng = parseFloat(localStorage.getItem('savedLng'));
            if(!lat || !lng) return;
            routeLayer.clearLayers();
            var targetLat = lat + 0.05;
            var targetLng = lng + 0.05;
            L.polyline([[lat, lng], [targetLat, targetLng]], {color: 'blue'}).addTo(routeLayer);
            L.marker([targetLat, targetLng]).addTo(routeLayer).bindPopup("Safe Zone").openPopup();
        }

        function loadMapData() {
            fetch('/api/sos').then(res => res.json()).then(data => {
                sosLayer.clearLayers();
                data.forEach(ev => {
                    L.circleMarker([ev.lat, ev.lng], {color: 'red'}).addTo(sosLayer).bindPopup("SOS");
                });
            });
            fetch('/api/volunteers').then(res => res.json()).then(data => {
                volLayer.clearLayers();
                data.forEach(vol => {
                    L.circleMarker([vol.lat, vol.lng], {color: 'green'}).addTo(volLayer).bindPopup("Volunteer");
                });
            });
        }

        setInterval(loadMapData, 5000);

        window.onload = function() {
            var savedLat = localStorage.getItem('savedLat');
            var savedLng = localStorage.getItem('savedLng');
            if(savedLat && savedLng) {
                map.setView([savedLat, savedLng], 12);
                marker = L.marker([savedLat, savedLng]).addTo(map);
            }
            loadMapData();
        };
    </script>
</body>
</html>
