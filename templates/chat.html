<!DOCTYPE html>
<html lang="en">
<head>
    <title>Global Comms</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #020617;
            color: #f8fafc;
            font-family: sans-serif;
            padding: 20px;
            padding-top: 80px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .ticker-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: #ef4444;
            color: white;
            padding: 12px 0;
            z-index: 1050;
            overflow: hidden;
            white-space: nowrap;
            box-shadow: 0 2px 10px rgba(239, 68, 68, 0.5);
            border-bottom: 2px solid #b91c1c;
        }
        .ticker-text {
            display: inline-block;
            padding-left: 100%;
            animation: ticker 25s linear infinite;
            font-weight: bold;
            font-family: monospace;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }
        @keyframes ticker {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }
        #chatBox {
            height: 60vh;
            overflow-y: auto;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid #1e293b;
            border-radius: 12px;
            padding: 20px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }
        .msg {
            margin-bottom: 12px;
            padding: 12px;
            border-radius: 8px;
            background: rgba(255,255,255,0.03);
            border-left: 3px solid #0ea5e9;
        }
        .msg-time {
            font-size: 0.8rem;
            color: #64748b;
            float: right;
            font-family: monospace;
        }
        .msg-user {
            font-weight: bold;
            color: #38bdf8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .form-control {
            background: #0f172a !important;
            border: 1px solid #334155 !important;
            color: #ffffff !important;
        }
        .form-control::placeholder {
            color: #64748b;
        }
        .form-control:focus {
            box-shadow: 0 0 0 0.25rem rgba(14, 165, 233, 0.25) !important;
            border-color: #0ea5e9 !important;
        }
        .btn-back {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: #1e293b;
            color: white;
            border: 1px solid #0ea5e9;
            border-radius: 30px;
            padding: 12px 25px;
            z-index: 1000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
            text-decoration: none;
            font-weight: bold;
        }
        .btn-back:hover {
            background: #0ea5e9;
            color: white;
            transform: scale(1.05);
        }
        footer {
            margin-top: auto;
            padding: 20px 0;
            border-top: 1px solid #1e293b;
            color: #64748b;
            font-size: 0.9rem;
            text-align: center;
        }
    </style>
</head>
<body class="container">
    <div class="ticker-bar">
        <div class="ticker-text">{{ ticker }}</div>
    </div>

    <a href="/" class="btn-back">⬅ Dashboard</a>
    <h2 class="fw-bold mb-2 mt-4 text-info">💬 Encrypted Comms Grid</h2>
    <p class="text-secondary mb-4">Open frequency. Broadcasts are public to the network.</p>

    <div id="chatBox" class="mb-4"></div>

    <div class="row g-3">
        <div class="col-md-3">
            <input type="text" id="username" class="form-control py-3" placeholder="Enter Callsign">
        </div>
        <div class="col-md-7">
            <input type="text" id="message" class="form-control py-3" placeholder="Type transmission..." onkeypress="if(event.key === 'Enter') sendMessage()">
        </div>
        <div class="col-md-2">
            <button class="btn btn-info w-100 py-3 fw-bold text-white" onclick="sendMessage()">TRANSMIT</button>
        </div>
    </div>

    <footer>&copy; 2026 Genius Olympiad 8036 Project BinaryMonkeys</footer>

    <script>
        function loadMessages() {
            fetch('/api/chat')
            .then(res => res.json())
            .then(data => {
                const box = document.getElementById('chatBox');
                box.innerHTML = "";

                data.forEach(msg => {
                    box.innerHTML += `<div class="msg"><span class="msg-time">${msg.time}</span><span class="msg-user">${msg.user}</span> <span class="ms-3 text-light">${msg.text}</span></div>`;
                });

                box.scrollTop = box.scrollHeight;
            });
        }

        function sendMessage() {
            const user = document.getElementById('username').value || "Operator";
            const text = document.getElementById('message').value;

            if(!text) return;

            fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user: user, text: text })
            }).then(() => {
                document.getElementById('message').value = "";
                loadMessages();
            });
        }

        setInterval(loadMessages, 3000);
        loadMessages();
    </script>
</body>
</html>
