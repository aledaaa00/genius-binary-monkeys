<!DOCTYPE html>
<html lang="en">
<head>
    <title>Storms</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white container mt-5">
    <div class="alert alert-danger text-center"><strong>{{ ticker }}</strong></div>
    <a href="/" class="btn btn-outline-light mb-4">Back to Dashboard</a>
    <h2>Storm Camera</h2>

    <video id="webcam" autoplay playsinline style="width: 100%; max-width: 500px; border: 1px solid #555;"></video>
    <br>
    <button onclick="scanSky()" class="btn btn-secondary mt-3">Scan Sky</button>

    <div id="result" class="mt-4 d-none">
        <h4 id="status"></h4>
        <p>Density: <span id="density"></span>%</p>
    </div>

    <script>
        const video = document.getElementById('webcam');
        navigator.mediaDevices.getUserMedia({ video: true }).then(stream => {
            video.srcObject = stream;
        });

        function scanSky() {
            fetch('/analyze-sky', { method: 'POST' })
            .then(res => res.json())
            .then(data => {
                document.getElementById('result').classList.remove('d-none');
                document.getElementById('status').innerText = data.status;
                document.getElementById('density').innerText = data.density;
            });
        }
    </script>
</body>
</html>
